<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>تفاصيل الفندق</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <link rel="stylesheet" href="hotel-details.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/i18next@23.10.1/dist/umd/i18next.min.js"></script>
  </head>
  <style >
/* ================== HOTEL DETAILS - SUNGET.COM ================== */

/* ---------- THEME VARIABLES (مستوردة من الستايل الأساسي) ---------- */
:root,
[data-theme="dark"] {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --radius: 14px;
  --header-h: 80px;
}

[data-theme="light"] {
  --bg: #f7f7fb;
  --bg-2: #ffffff;
  --surface: #ffffff;
  --surface-2: #f1f1f7;
  --text: #1a1a24;
  --text-muted: #555566;
  --border: rgba(0, 0, 0, 0.08);
  --accent: #ff8a00;
  --accent-2: #ff5e00;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

/* ---------- RESET & BASE ---------- */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Cairo", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

html[dir="rtl"] {
  direction: rtl;
  text-align: right;
}

/* ================== HOTEL HEADER ================== */
.hotel-header {
  background: linear-gradient(135deg, rgba(11, 11, 15, 0.95), rgba(26, 26, 36, 0.95));
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 25px 5%;
  text-align: center;
  position: relative;
  box-shadow: var(--shadow);
}

.hotel-header::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  opacity: 0.1;
  z-index: 0;
}

.hotel-header h1 {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 800;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.hotel-header .price {
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  color: var(--accent);
  position: relative;
  z-index: 1;
}

/* ================== SLIDER SECTION ================== */
.slider-section {
  padding: 30px 5% 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.slider {
  position: relative;
  max-width: 100%;
  height: 450px;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  background: var(--surface);
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.slides img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  flex-shrink: 0;
}

.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav.prev {
  left: 20px;
}

.nav.next {
  right: 20px;
}

.nav:hover {
  background: var(--accent);
  color: #000;
  transform: translateY(-50%) scale(1.1);
}

.dots {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 20px 0;
}

.dots span {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.3);
  cursor: pointer;
  transition: all 0.3s ease;
}

.dots span.active,
.dots span:hover {
  background: var(--accent);
  transform: scale(1.2);
}

/* ================== BOOK NOW BUTTON ================== */
.book-wrap {
  padding: 0 5%;
  margin: 20px 0 40px;
  display: flex;
  justify-content: center;
}

.book-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  font-weight: 700;
  font-size: 18px;
  padding: 16px 40px;
  border-radius: 50px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 10px 25px rgba(255, 180, 0, 0.35);
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.book-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(255, 180, 0, 0.45);
}

/* ================== HOTEL INFO ================== */
.hotel-info {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
}

.hotel-info h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
  position: relative;
}

.hotel-info h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  margin: 10px auto 0;
}

.hotel-info p {
  font-size: 16px;
  line-height: 1.9;
  color: var(--text-muted);
  text-align: center;
  max-width: 700px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ================== AMENITIES ================== */
.amenities-section {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
}

.amenities-section h2 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 30px;
  text-align: center;
  position: relative;
}

.amenities-section h2::after {
  content: "";
  display: block;
  width: 60px;
  height: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  margin: 10px auto 0;
}

.amenities {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px 0;
}

.amenity {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 12px;
  text-align: center;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.3s ease;
  cursor: default;
}

.amenity:hover {
  background: var(--surface-2);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  border-color: var(--accent);
}

/* ================== MAP SECTION ================== */
.map-section {
  max-width: 900px;
  margin: 0 auto 60px;
  padding: 0 5%;
  text-align: center;
}

.map-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  color: var(--text);
  padding: 16px 30px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 16px;
  border: 2px solid var(--border);
  transition: all 0.3s ease;
  max-width: 300px;
  margin: 0 auto;
}

.map-btn:hover {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(255, 180, 0, 0.35);
  border-color: var(--accent);
}

.map-btn i {
  font-size: 20px;
}

/* ================== CHAT SECTION ================== */
.chat-section {
  max-width: 700px;
  margin: 0 auto 80px;
  padding: 0 5%;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.chat-section h2 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 25px;
  text-align: center;
  position: relative;
}

.chat-section h2::after {
  content: "";
  display: block;
  width: 50px;
  height: 3px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 2px;
  margin: 10px auto 0;
}

.chat-box {
  background: var(--surface-2);
  border-radius: 16px;
  height: 400px;
  padding: 20px;
  overflow-y: auto;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.chat-box p {
  margin-bottom: 12px;
  padding: 12px 16px;
  border-radius: 18px;
  max-width: 75%;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
  animation: messageSlide 0.3s ease;
}

.chat-box p:last-child {
  margin-bottom: 0;
}

@keyframes messageSlide {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.chat-box p[style*="text-align: right"] {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  margin-left: auto;
}

.chat-box p[style*="text-align: left"] {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.chat-input-wrap {
  display: flex;
  gap: 12px;
  align-items: center;
}

#chatInput {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 25px;
  padding: 14px 20px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: all 0.3s ease;
}

#chatInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.15);
}

#sendMsg {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: #000;
  font-weight: 700;
  padding: 14px 24px;
  border-radius: 25px;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
}

#sendMsg:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(255, 180, 0, 0.35);
}

/* ================== SCROLLBAR ================== */
.chat-box::-webkit-scrollbar {
  width: 6px;
}

.chat-box::-webkit-scrollbar-track {
  background: transparent;
}

.chat-box::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.2);
  border-radius: 10px;
}

.chat-box::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg);
}

::-webkit-scrollbar-thumb {
  background: var(--surface-2);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}

/* ================== RESPONSIVE ================== */
@media (max-width: 768px) {
  .slider {
    height: 350px;
  }
  
  .nav {
    width: 45px;
    height: 45px;
    font-size: 18px;
  }
  
  .nav.prev {
    left: 15px;
  }
  
  .nav.next {
    right: 15px;
  }
  
  .hotel-header {
    padding: 20px 4%;
  }
  
  .book-btn {
    padding: 14px 30px;
    font-size: 16px;
  }
  
  .amenities {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }
  
  .chat-section {
    margin-bottom: 40px;
    padding: 30px 20px;
  }
  
  .chat-box {
    height: 300px;
  }
}

@media (max-width: 480px) {
  .slider {
    height: 280px;
    border-radius: 12px;
  }
  
  .hotel-header h1 {
    font-size: 24px;
  }
  
  .hotel-header .price {
    font-size: 20px;
  }
  
  .book-btn {
    padding: 12px 24px;
    font-size: 15px;
    flex-direction: column;
    gap: 8px;
  }
  
  .amenities {
    grid-template-columns: 1fr 1fr;
  }
  
  .amenity {
    padding: 14px 10px;
    font-size: 13px;
  }
  
  .chat-input-wrap {
    flex-direction: column;
  }
  
  #sendMsg {
    width: 100%;
    justify-content: center;
  }
  
  .chat-section {
    padding: 25px 15px;
  }
}
    
  </style>
  <body>
    <!-- ===== HEADER ===== -->
    <header class="hotel-header">
      <h1 id="hotelName">جارٍ التحميل...</h1>
      <p class="price"><span id="hotelPrice"></span></p>
    </header>

    <!-- ===== SLIDER ===== -->
    <section class="slider-section">
      <div class="slider">
        <div id="slides" class="slides"></div>
        <button class="nav prev" aria-label="السابق">‹</button>
        <button class="nav next" aria-label="التالي">›</button>
        <div id="dots" class="dots"></div>
      </div>
    </section>

    <!-- ===== BOOK NOW ===== -->
    <div class="book-wrap">
      <button id="bookNowBtn" class="book-btn">
        <i class="fa-solid fa-calendar-check"></i>
        احجز الآن
      </button>
    </div>

    <!-- ===== DESCRIPTION ===== -->
    <section class="hotel-info">
      <h2>وصف الفندق</h2>
      <p id="hotelDesc"></p>
    </section>

    <!-- ===== AMENITIES ===== -->
    <section class="amenities-section">
      <h2 data-i18n="hotel.amenities">المرافق</h2>
      <div id="amenities" class="amenities"></div>
    </section>

    <!-- ===== MAP ===== -->
    <section class="map-section">
      <a id="mapLink" href="#" target="_blank" class="map-btn" data-i18n="hotel.map">
        <i class="fa-solid fa-map-location-dot"></i>
        عرض الموقع على الخريطة
      </a>
    </section>

    <!-- ===== CHAT ===== -->
    <section class="chat-section">
      <h2 data-i18n="chat.title">الدردشة مع الفندق</h2>
      <div id="chatBox" class="chat-box"></div>
      <div class="chat-input-wrap">
        <input type="text" id="chatInput" data-i18n-placeholder="chat.placeholder" placeholder="اكتب رسالتك..." />
        <button id="sendMsg" data-i18n="chat.send">إرسال</button>
      </div>
    </section>

    <script>
      /* ===== SUPABASE INIT ===== */
      const supabaseClient = supabase.createClient(
        "https://mqvmxqzwvpasdytbpbke.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM"
      );

      const params = new URLSearchParams(window.location.search);
      const hotelId = params.get("id");
      let currentSlide = 0;

      /* ===== LOAD HOTEL ===== */
      async function loadHotel() {
        if (!hotelId) return;
        try {
          const { data, error } = await supabaseClient
            .from("hotels").select("*").eq("id", hotelId).single();

          if (error || !data) {
            document.body.innerHTML = "❌ الفندق غير موجود";
            return;
          }

          document.getElementById("hotelName").textContent = data.hotel_name;
          document.getElementById("hotelPrice").textContent =
            data.price_per_night + " " + i18next.t("hotel.price");
          document.getElementById("hotelDesc").textContent = data.description || "";

          const slides = document.getElementById("slides");
          const dots = document.getElementById("dots");
          slides.innerHTML = "";
          dots.innerHTML = "";

          let imagesArray = [];
          if (Array.isArray(data.photo_urls)) imagesArray = data.photo_urls;

          if (imagesArray.length > 0) {
            imagesArray.forEach((img, index) => {
              const image = document.createElement("img");
              if (img.startsWith("http")) {
                image.src = img;
              } else {
                const { data: publicUrlData } = supabaseClient.storage
                  .from("hotel-photos").getPublicUrl(img);
                image.src = publicUrlData.publicUrl;
              }
              image.loading = "lazy";
              image.onerror = () => console.log("❌ Image failed:", img);
              slides.appendChild(image);

              const dot = document.createElement("span");
              if (index === 0) dot.classList.add("active");
              dot.addEventListener("click", () => {
                currentSlide = index;
                updateSlider();
              });
              dots.appendChild(dot);
            });
            updateSlider();
          } else {
            slides.innerHTML = "<p>لا توجد صور لهذا الفندق</p>";
          }

          /* AMENITIES */
          const amenitiesBox = document.getElementById("amenities");
          amenitiesBox.innerHTML = "";
          let amenitiesArray = [];
          if (typeof data.amenities === "string" && data.amenities.trim() !== "") {
            amenitiesArray = data.amenities.split(",").map((a) => a.trim());
          }
          if (amenitiesArray.length > 0) {
            amenitiesArray.forEach((item) => {
              const span = document.createElement("span");
              span.className = "amenity";
              span.textContent = item;
              amenitiesBox.appendChild(span);
            });
          } else {
            amenitiesBox.innerHTML = `<p>${i18next.t("hotel.noAmenities")}</p>`;
          }

          /* MAP */
          const mapBtn = document.getElementById("mapLink");
          if (data.map_link && data.map_link.trim() !== "") {
            mapBtn.href = data.map_link;
            mapBtn.style.pointerEvents = "auto";
            mapBtn.style.opacity = "1";
          } else {
            mapBtn.textContent = i18next.t("hotel.mapUnavailable");
            mapBtn.style.pointerEvents = "none";
            mapBtn.style.opacity = "0.5";
          }
        } catch (err) {
          console.error("Load hotel error:", err);
        }
      }

      /* ===== SLIDER ===== */
      function updateSlider() {
        const slidesEl = document.getElementById("slides");
        const dotsEl = document.querySelectorAll("#dots span");
        slidesEl.style.transform = `translateX(-${currentSlide * 100}%)`;
        dotsEl.forEach((dot, i) => dot.classList.toggle("active", i === currentSlide));
      }

      document.querySelector(".nav.next")?.addEventListener("click", () => {
        const total = document.querySelectorAll("#slides img").length;
        if (!total) return;
        currentSlide = (currentSlide + 1) % total;
        updateSlider();
      });

      document.querySelector(".nav.prev")?.addEventListener("click", () => {
        const total = document.querySelectorAll("#slides img").length;
        if (!total) return;
        currentSlide = (currentSlide - 1 + total) % total;
        updateSlider();
      });

      /* ===== CHAT ===== */
      async function loadMessages() {
        if (!hotelId) return;
        const { data, error } = await supabaseClient
          .from("hotel_messages").select("*")
          .eq("hotel_id", hotelId)
          .order("created_at", { ascending: true });
        if (error || !data) return;

        const box = document.getElementById("chatBox");
        box.innerHTML = "";
        data.forEach((msg) => {
          const p = document.createElement("p");
          const senderText = msg.sender_type === "hotel"
            ? i18next.t("chat.hotel") : i18next.t("chat.you");
          p.textContent = senderText + " " + msg.message;
          p.style.textAlign = msg.sender_type === "hotel" ? "left" : "right";
          box.appendChild(p);
        });
        box.scrollTop = box.scrollHeight;
      }

      async function sendMessage() {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg || !hotelId) return;

        const { data: userData } = await supabaseClient.auth.getUser();
        if (!userData.user) return alert("يجب تسجيل الدخول");

        const { error } = await supabaseClient.from("hotel_messages").insert([{
          hotel_id: hotelId,
          hotel_name: document.getElementById("hotelName").textContent,
          user_id: userData.user.id,
          message: msg,
          sender_type: "user",
        }]);
        if (error) return console.error(error);

        input.value = "";
        loadMessages();
      }

      document.getElementById("sendMsg").addEventListener("click", sendMessage);
      document.getElementById("chatInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

      /* ===== BOOK ===== */
      document.getElementById("bookNowBtn").addEventListener("click", () => {
        window.location.href = `booking.html?id=${hotelId}`;
      });

      /* ===== I18N ===== */
      function updateContent() {
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          el.innerHTML = i18next.t(el.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
          el.placeholder = i18next.t(el.dataset.i18nPlaceholder);
        });
        document.documentElement.lang = i18next.language;
        document.documentElement.dir = i18next.language === "ar" ? "rtl" : "ltr";
      }

      i18next.init({
        lng: localStorage.getItem("lang") || "ar",
        fallbackLng: "en",
        resources: {
          ar: { translation: {
            hotel: { price: "جنيه / ليلة", details: "عرض التفاصيل", amenities: "المرافق",
              map: "عرض الموقع على الخريطة", mapUnavailable: "الموقع غير متوفر",
              noHotels: "لا توجد فنادق حالياً", noAmenities: "لا توجد مرافق مسجلة" },
            chat: { title: "الدردشة مع الفندق", placeholder: "اكتب رسالتك...",
