    dot.addEventListener('click', () => goToSlide(index));

      function updateSlider() {
        const slidesEl = document.getElementById("slides");
        const dotsEl = document.querySelectorAll("#dots span");

        slidesEl.style.transform = `translateX(-${currentSlide * 100}%)`;

        dotsEl.forEach((dot, i) => {
          dot.classList.toggle("active", i === currentSlide);
        });
      }

      document.querySelector(".nav.next")?.addEventListener("click", () => {
        const total = document.querySelectorAll("#slides img").length;
        if (!total) return;
        currentSlide = (currentSlide + 1) % total;
        updateSlider();
      });

      document.querySelector(".nav.prev")?.addEventListener("click", () => {
        const total = document.querySelectorAll("#slides img").length;
        if (!total) return;
        currentSlide = (currentSlide - 1 + total) % total;
        updateSlider();
      });
      async function loadMessages() {

          .order("created_at", { ascending: true });

        const box = document.getElementById("chatBox");
        box.innerHTML = "";

        data.forEach((msg) => {
          const p = document.createElement("p");

          const senderText =
            msg.sender_type === "hotel"
              ? i18next.t("chat.hotel")
              : i18next.t("chat.you");

          p.textContent = senderText + " " + msg.message;

          p.style.textAlign = msg.sender_type === "hotel" ? "left" : "right";

          box.appendChild(p);
        });

        box.scrollTop = box.scrollHeight;
      }

      // دالة إرسال رسالة
      async function sendMessage() {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg || !hotelId) return;

        // جلب بيانات المستخدم
        const { data: userData } = await supabaseClient.auth.getUser();
        if (!userData.user) return alert("يجب تسجيل الدخول");

        // إدخال الرسالة في جدول hotel_messages
        const { error } = await supabaseClient.from("hotel_messages").insert([
          {
            hotel_id: hotelId,
            hotel_name: document.getElementById("hotelName").textContent,
            user_id: userData.user.id,
            message: msg,
            sender_type: "user",
          },
        ]);

        if (error) {
          console.error("حدث خطأ أثناء إرسال الرسالة:", error);
          return;
        }

        input.value = ""; // مسح الصندوق
        loadMessages(); // إعادة تحميل الرسائل فوراً
      }

      // ربط الزر بإرسال الرسالة
      document.getElementById("sendMsg").addEventListener("click", sendMessage);

      // إرسال رسالة عند الضغط على Enter
      document.getElementById("chatInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") sendMessage();
      });

    <script>
      document.getElementById("sendMsg").addEventListener("click", async () => {
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();

        if (!msg) return;

        try {
          // جلب بيانات المستخدم
          const { data: userData } = await supabaseClient.auth.getUser();
          if (!userData.user) {
            alert("يجب تسجيل الدخول لإرسال رسالة");
            return;
          }

          // إرسال الرسالة للجدول الصحيح
          const { data, error } = await supabaseClient
            .from("hotel_messages")
            .insert([
              {
                hotel_id: hotelId,
                message: msg,
                sender_name: userData.user.user_metadata?.full_name || "مستخدم",
                sender_type: "user",
              },
            ])
            .select();

          if (error) {
            console.error("حدث خطأ أثناء إرسال الرسالة:", error);
            return;
          }

          // مسح صندوق الإدخال
          input.value = "";

          // إعادة تحميل الرسائل
          loadMessages();
        } catch (err) {
          console.error("حدث خطأ أثناء إرسال الرسالة:", err);
        }
      });
    </script>
