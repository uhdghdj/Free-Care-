
<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>تفاصيل الفندق</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/i18next@23.10.1/dist/umd/i18next.min.js"></script>

<style>
/* ===== اختصار: خليت جزء CSS زي ما هو عندك بدون تغيير كبير ===== */
body{font-family:Cairo,sans-serif;background:#111;color:#fff;padding:20px}
.slider{position:relative;overflow:hidden;border-radius:15px}
.slides{display:flex;transition:0.5s}
.slide{min-width:100%}
.slide img{width:100%;height:300px;object-fit:cover}
.nav{position:absolute;top:50%;transform:translateY(-50%);cursor:pointer;font-size:30px}
.prev{right:10px}
.next{left:10px}
.dots{text-align:center;margin-top:10px}
.dots span{display:inline-block;width:10px;height:10px;background:#555;border-radius:50%;margin:3px;cursor:pointer}
.dots .active{background:#fff}
.amenity{display:inline-block;background:#333;padding:5px 10px;margin:5px;border-radius:20px}
</style>
</head>

<body>

<h1 id="hotelName"></h1>
<p id="hotelDesc"></p>
<h3 id="hotelPrice"></h3>

<button id="bookNowBtn">احجز الآن</button>

<!-- Slider -->
<div class="slider">
  <div class="nav prev">›</div>
  <div class="slides" id="slides"></div>
  <div class="nav next">‹</div>
</div>
<div class="dots" id="dots"></div>

<h3>المرافق</h3>
<div id="amenities"></div>

<a id="mapLink" target="_blank">عرض الموقع على الخريطة</a>

<hr>

<h3>الدردشة</h3>
<div id="chatBox" style="height:200px;overflow:auto;background:#222;padding:10px"></div>

<input id="chatInput" placeholder="اكتب رسالتك..." />
<button id="sendMsg"><i class="fa-solid fa-paper-plane"></i></button>

<script>
const supabaseClient = supabase.createClient(
"https://mqvmxqzwvpasdytbpbke.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM"
);

const hotelId = new URLSearchParams(location.search).get("id");

let currentSlide = 0;

/* ================= LOAD HOTEL ================= */
async function loadHotel() {
const { data } = await supabaseClient.from("hotels").select("*").eq("id", hotelId).single();

if (!data) return;

document.getElementById("hotelName").textContent = data.hotel_name;
document.getElementById("hotelDesc").textContent = data.description;
document.getElementById("hotelPrice").textContent = data.price_per_night + " جنيه";


// ===== images =====
const slides = document.getElementById("slides");
const dots = document.getElementById("dots");

slides.innerHTML = "";
dots.innerHTML = "";

(data.photo_urls || []).forEach((img, i) => {
const div = document.createElement("div");
div.className = "slide";
div.innerHTML = `<img src="${img}" />`;
slides.appendChild(div);

const dot = document.createElement("span");
dot.onclick = () => goTo(i);
if(i === 0) dot.classList.add("active");
dots.appendChild(dot);
});

// ===== amenities (FIXED) =====
const amenitiesBox = document.getElementById("amenities");
amenitiesBox.innerHTML = "";

const amenitiesArray = data.amenities || [];

if (amenitiesArray.length) {
amenitiesArray.forEach(a => {
const s = document.createElement("span");
s.className = "amenity";
s.textContent = a;
amenitiesBox.appendChild(s);
});
} else {
amenitiesBox.textContent = "لا يوجد مرافق";
}

// map
const map = document.getElementById("mapLink");
if (data.map_link) map.href = data.map_link;
}

/* ================= SLIDER ================= */
function updateSlider() {
document.getElementById("slides").style.transform =
`translateX(-${currentSlide * 100}%)`;

document.querySelectorAll("#dots span").forEach((d,i)=>{
d.classList.toggle("active", i===currentSlide);
});
}

function initSlider() {
const total = document.querySelectorAll(".slide").length;

document.querySelector(".next").onclick = () => {
currentSlide = (currentSlide + 1) % total;
updateSlider();
};

document.querySelector(".prev").onclick = () => {
currentSlide = (currentSlide - 1 + total) % total;
updateSlider();
};

updateSlider();
}

/* ================= CHAT ================= */
async function loadMessages() {
const { data } = await supabaseClient
.from("hotel_messages")
.select("*")
.eq("hotel_id", hotelId)
.order("created_at", { ascending: true });

const box = document.getElementById("chatBox");
box.innerHTML = "";

(data || []).forEach(m => {
const p = document.createElement("p");
p.textContent = (m.sender_type === "hotel" ? "الفندق: " : "أنت: ") + m.message;
box.appendChild(p);
});

box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
const input = document.getElementById("chatInput");
const msg = input.value.trim();
if(!msg) return;

const { data: user } = await supabaseClient.auth.getUser();
if(!user.user) return alert("سجل دخول أولاً");

await supabaseClient.from("hotel_messages").insert([{
hotel_id: hotelId,
message: msg,
sender_type: "user"
}]);

input.value = "";
loadMessages();
}

/* ================= EVENTS ================= */
document.getElementById("sendMsg").onclick = sendMessage;

document.getElementById("chatInput").addEventListener("keydown", e=>{
if(e.key==="Enter") sendMessage();
});

document.getElementById("bookNowBtn").onclick = () => {
location.href = `booking.html?id=${hotelId}`;
};

/* ================= INIT ================= */
loadHotel().then(()=>{
setTimeout(initSlider, 500);
loadMessages();
setInterval(loadMessages, 3000);
});
</script>

</body>
</html>
