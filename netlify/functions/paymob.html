<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>الدفع</title>

  <style>
    body {
      font-family: "Cairo", sans-serif;
      background: linear-gradient(180deg, #0b6df0, #0b84ff);
      color: #fff;
      text-align: center;
      padding-top: 60px;
    }

    h1 { margin-bottom: 10px; }

    .box {
      background: #fff;
      color: #000;
      width: 90%;
      max-width: 420px;
      margin: 30px auto;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    button {
      margin: 10px;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #0b6df0;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #084fc7;
    }

    .kiosk-box {
      display: none;
      background: #fff;
      color: #0b6df0;
      width: 90%;
      max-width: 420px;
      margin: 40px auto;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .kiosk-code {
      font-size: 32px;
      font-weight: bold;
      background: #f3f3f3;
      padding: 12px;
      margin: 15px 0;
      border-radius: 10px;
    }

    .small {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>💳 اختر طريقة الدفع</h1>

<div class="box">
  <h2 id="price"></h2>

  <button onclick="createPayment('card')">💳 بطاقة</button>
  <button onclick="createPayment('wallet')">📱 محفظة</button>
  <button onclick="createPayment('kiosk')">🏧 كيوسك</button>
</div>

<!-- Kiosk -->
<div id="kioskBox" class="kiosk-box">
  <h2>تم إنشاء الكود</h2>
  <p class="small">ادفع في فوري أو مصاري بالكود التالي:</p>

  <div id="kioskCode" class="kiosk-code">------</div>

  <button onclick="copyCode()">📋 نسخ الكود</button>
  <button onclick="closeBox()">إغلاق</button>
</div>

<script>
/* =========================
   1. جلب بيانات الحجز
========================= */
const bookingData = JSON.parse(localStorage.getItem("bookingData"));

if (!bookingData) {
  alert("لا توجد بيانات حجز");
  window.location.href = "/";
}

/* عرض السعر */
document.getElementById("price").textContent =
  "المبلغ المطلوب: " + bookingData.amountToPay + " جنيه";

/* =========================
   2. إنشاء الدفع
========================= */
async function createPayment(type) {
  try {
    const res = await fetch("/.netlify/functions/create-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...bookingData,
        integration_type: type
      })
    });

    const data = await res.json();
    console.log(data);

    // 💳 تحويل مباشر
    if (data.payment_url) {
      window.location.href = data.payment_url;
    }

    // 🏧 كيوسك
    else if (data.method === "kiosk") {
      document.getElementById("kioskCode").textContent =
        data.bill_reference || "----";

      document.getElementById("kioskBox").style.display = "block";
    }

    else {
      alert("خطأ: " + JSON.stringify(data));
    }

  } catch (err) {
    alert("خطأ في الاتصال: " + err.message);
  }
}

/* =========================
   3. نسخ كود الكيوسك
========================= */
function copyCode() {
  const code = document.getElementById("kioskCode").textContent;
  navigator.clipboard.writeText(code);
  alert("تم النسخ");
}

/* إغلاق */
function closeBox() {
  document.getElementById("kioskBox").style.display = "none";
}
</script>

</body>
</html>
