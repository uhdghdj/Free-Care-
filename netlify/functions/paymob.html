
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>الدفع</title>

  <style>
/* ================== SUNGET.COM — PAYMENT PAGE STYLESHEET (FULLY RESPONSIVE) ================== */

/* ---------- THEME VARIABLES ---------- */
:root,
[data-theme="dark"] {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.55);
  --radius: 14px;
  --gradient-accent: linear-gradient(135deg, var(--accent), var(--accent-2));
  --glow: 0 0 28px rgba(255, 180, 0, 0.35);
}

[data-theme="light"] {
  --bg: #fff8ec;
  --bg-2: #fff2dc;
  --surface: #ffffff;
  --surface-2: #fff7e6;
  --text: #1a1a24;
  --text-muted: #5a5a6a;
  --border: rgba(0, 0, 0, 0.08);
  --shadow: 0 10px 30px rgba(255, 122, 0, 0.12);
  --shadow-lg: 0 25px 60px rgba(255, 122, 0, 0.18);
}

/* ---------- RESET ---------- */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  scroll-behavior: smooth;
}

html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
}

body {
  font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(12px, 4vw, 40px);
  position: relative;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

img, svg, video {
  max-width: 100%;
  height: auto;
  display: block;
}

/* ---------- BACKGROUND EFFECTS ---------- */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255, 180, 0, 0.18), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(255, 122, 0, 0.18), transparent 45%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle, rgba(255, 180, 0, 0.5) 1px, transparent 1px);
  background-size: clamp(30px, 6vw, 60px) clamp(30px, 6vw, 60px);
  opacity: 0.15;
  animation: drift 30s linear infinite;
  z-index: -1;
}

@keyframes drift {
  from { background-position: 0 0; }
  to { background-position: 60px 60px; }
}

/* ---------- HEADING ---------- */
h1 {
  font-size: clamp(20px, 5vw, 34px);
  font-weight: 800;
  text-align: center;
  margin-bottom: clamp(16px, 4vw, 28px);
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(255, 180, 0, 0.25);
  animation: fadeUp 0.7s ease both;
  line-height: 1.3;
  padding: 0 8px;
}

/* ---------- MAIN BOX ---------- */
.box {
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: clamp(18px, 5vw, 40px);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  position: relative;
  animation: fadeUp 0.8s ease both;
}

.box::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  padding: 1px;
  background: var(--gradient-accent);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.6;
  pointer-events: none;
}

/* ---------- PRICE ---------- */
#price {
  font-size: clamp(16px, 3.5vw, 22px);
  font-weight: 700;
  text-align: center;
  padding: clamp(12px, 3vw, 18px) clamp(14px, 4vw, 20px);
  margin-bottom: clamp(16px, 4vw, 24px);
  border-radius: 12px;
  background: var(--surface-2);
  border: 2px solid var(--accent);
  color: var(--text);
  box-shadow:
    inset 0 0 20px rgba(255, 180, 0, 0.1),
    0 6px 20px rgba(0, 0, 0, 0.25);
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* ---------- BUTTONS ---------- */
button {
  display: block;
  width: 100%;
  padding: clamp(11px, 3vw, 14px) clamp(14px, 4vw, 18px);
  margin-top: clamp(10px, 2vw, 12px);
  font-family: inherit;
  font-size: clamp(14px, 3.5vw, 16px);
  font-weight: 700;
  color: #000;
  background: var(--gradient-accent);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 8px 20px rgba(255, 122, 0, 0.3);
  position: relative;
  overflow: hidden;
  min-height: 44px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

button::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg,
    transparent 0%,
    rgba(255, 255, 255, 0.4) 50%,
    transparent 100%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}

@media (hover: hover) {
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(255, 180, 0, 0.45), var(--glow);
  }
  button:hover::before {
    transform: translateX(100%);
  }
}

button:active {
  transform: translateY(0);
  box-shadow: 0 4px 12px rgba(255, 122, 0, 0.3);
}

button:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 3px;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* ---------- KIOSK BOX ---------- */
.kiosk-box {
  display: none;
  width: 100%;
  max-width: 460px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: clamp(18px, 5vw, 40px);
  margin-top: clamp(16px, 4vw, 24px);
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  text-align: center;
  animation: fadeUp 0.5s ease both;
  position: relative;
}

.kiosk-box h2 {
  font-size: clamp(16px, 4vw, 24px);
  font-weight: 800;
  margin-bottom: 12px;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.3;
}

.kiosk-box .small {
  font-size: clamp(12px, 3vw, 14px);
  color: var(--text-muted);
  margin-bottom: 18px;
}

/* ---------- KIOSK CODE ---------- */
.kiosk-code {
  font-size: clamp(22px, 7vw, 42px);
  font-weight: 800;
  letter-spacing: clamp(2px, 1vw, 6px);
  padding: clamp(14px, 4vw, 22px);
  margin: clamp(12px, 3vw, 18px) 0;
  border-radius: 12px;
  background: var(--bg-2);
  border: 2px dashed var(--accent);
  color: var(--accent);
  font-family: "Courier New", monospace;
  text-shadow: 0 0 18px rgba(255, 180, 0, 0.5);
  user-select: all;
  word-break: break-all;
  overflow-wrap: break-word;
}

/* ---------- ANIMATIONS ---------- */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---------- RESPONSIVE BREAKPOINTS ---------- */
@media (min-width: 1440px) {
  .box, .kiosk-box { max-width: 520px; }
}

@media (max-width: 1024px) {
  body { padding: 32px 20px; }
}

@media (max-width: 768px) {
  body { padding: 24px 16px; }
  .box, .kiosk-box { max-width: 100%; }
}

@media (max-width: 640px) {
  body { padding: 20px 14px; }
  h1 { margin-bottom: 20px; }
}

@media (max-width: 480px) {
  body { padding: 16px 12px; }
  .box, .kiosk-box { padding: 20px 16px; border-radius: 12px; }
  button { margin-top: 10px; }
  #price { margin-bottom: 16px; }
}

@media (max-width: 380px) {
  body { padding: 12px 10px; }
  .box, .kiosk-box { padding: 16px 12px; }
  .kiosk-code { letter-spacing: 2px; }
}

@media (max-width: 320px) {
  h1 { font-size: 18px; }
  #price { font-size: 14px; padding: 10px; }
  button { font-size: 13px; padding: 10px 12px; }
  .kiosk-code { font-size: 20px; padding: 12px; }
}

@media (max-height: 500px) and (orientation: landscape) {
  body { justify-content: flex-start; padding: 16px; }
  h1 { margin-bottom: 12px; font-size: 20px; }
  .box, .kiosk-box { padding: 16px 20px; }
  button { padding: 10px 14px; margin-top: 8px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  body::after { animation: none; }
}

@media print {
  body::before, body::after { display: none; }
  body { background: #fff; color: #000; }
  button { display: none; }
}

  </style>
</head>

<body>


<div class="box">

  <h2 id="price"></h2>

  <h3 id="remaining"></h3>

  <button onclick="createPayment('card')">
    تاكيد الحجز
  </button>

</div>

<script>
const bookingData = JSON.parse(localStorage.getItem("bookingData"));

if (!bookingData) {
  alert("لا توجد بيانات حجز، سيتم تحويلك للرئيسية");
  window.location.href = "index.html";
}

// ✅ الإصلاح: amountToPay بدل deposit
document.getElementById("price").textContent =
  "المبلغ المطلوب (5%): " +
  Number(bookingData.amountToPay).toLocaleString() +
  " جنيه";

document.getElementById("remaining").textContent =
  "المتبقي للدفع في الفندق: " +
  Number(bookingData.remaining).toLocaleString() +
  " جنيه";

async function createPayment(type) {
  const amount = bookingData.amountToPay; // ✅ صح

  if (!amount || amount <= 0) {
    alert("خطأ: المبلغ غير صحيح");
    return;
  }

  const btn = document.querySelector("button");
  btn.disabled = true;
  btn.textContent = "⏳ جارٍ المعالجة...";

  try {
    const res = await fetch("/.netlify/functions/create-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        amount: amount,
        integration_type: type,
        booking_id: bookingData.bookingId
      })
    });

    const data = await res.json();
    console.log("Payment response:", data);

    if (data.payment_url) {
      window.location.href = data.payment_url;
    } else if (data.method === "kiosk") {
      document.getElementById("kioskCode").textContent =
        data.bill_reference || "----";
      document.getElementById("kioskBox").style.display = "block";
      btn.disabled = false;
      btn.textContent = "تأكيد الحجز";
    } else {
      alert("خطأ في الدفع: " + (data.message || JSON.stringify(data)));
      btn.disabled = false;
      btn.textContent = "تأكيد الحجز";
    }

  } catch (err) {
    console.error("Payment error:", err);
    alert("حصل خطأ في الاتصال بالسيرفر");
    btn.disabled = false;
    btn.textContent = "تأكيد الحجز";
  }
}
</script>

</body>
</html>
