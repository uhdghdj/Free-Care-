<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <title>SUNGET — تسجيل دخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
     /* 🔥 Responsive Design محسّن لكل الأجهزة 🔥 */
:root {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
  --radius: 20px;
  --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
  --gradient-hover: linear-gradient(135deg, var(--accent-2), var(--accent));
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  scroll-behavior: smooth;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(10px, 5vw, 30px);
  position: relative;
  overflow-x: hidden;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Background Animation */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 10% 30%, rgba(255, 180, 0, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 40% 10%, rgba(255, 180, 0, 0.06) 0%, transparent 40%);
  z-index: -1;
  animation: backgroundFloat 30s ease-in-out infinite;
}

@keyframes backgroundFloat {
  0%, 100% { transform: scale(1) translateY(0px); }
  33% { transform: scale(1.05) translateY(-20px); }
  66% { transform: scale(1.02) translateY(-10px); }
}

/* Main Card - Responsive */
.card {
  background: rgba(26, 26, 36, 0.95);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: clamp(30px, 8vw, 60px) clamp(25px, 6vw, 50px);
  width: 100%;
  max-width: clamp(350px, 90vw, 480px);
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  animation: cardSlideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  margin: 20px auto;
}

@keyframes cardSlideIn {
  from {
    opacity: 0;
    transform: translateY(50px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--gradient);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Logo Section - Responsive */
.logo {
  text-align: center;
  margin-bottom: clamp(25px, 6vw, 40px);
  position: relative;
}

.logo-img {
  width: clamp(70px, 18vw, 90px);
  height: clamp(70px, 18vw, 90px);
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid rgba(255, 255, 255, 0.15);
  margin: 0 auto clamp(15px, 4vw, 24px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: block;
}

.logo-img:hover {
  transform: scale(1.08) rotate(5deg);
  border-color: rgba(255, 180, 0, 0.4);
  box-shadow: 0 20px 45px rgba(255, 180, 0, 0.3);
}

.logo h3 {
  font-size: clamp(1.6rem, 6vw, 2.8rem);
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.8px;
  margin-bottom: 8px;
  line-height: 1.2;
}

.logo h3:nth-of-type(2) {
  font-size: clamp(1.3rem, 4vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  background: none;
  -webkit-text-fill-color: var(--text);
  margin-top: 4px;
  opacity: 0.9;
  line-height: 1.3;
}

/* Form - Responsive */
#login-form {
  display: flex;
  flex-direction: column;
  gap: clamp(20px, 5vw, 28px);
}

#login-form input {
  width: 100%;
  padding: clamp(18px, 5vw, 24px) clamp(20px, 6vw, 28px);
  border: 2px solid var(--border);
  border-radius: 16px;
  font-size: clamp(0.95rem, 4vw, 1.1rem);
  font-family: inherit;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--text);
  font-weight: 500;
  min-height: 56px;
}

#login-form input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
}

#login-form input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 
    0 0 0 4px rgba(255, 180, 0, 0.15),
    0 20px 40px rgba(0, 0, 0, 0.3);
  transform: translateY(-3px);
  background: var(--surface-2);
}

/* Password Wrapper */
.pass-wrapper {
  position: relative;
  width: 100%;
}

.pass-wrapper input {
  padding-right: clamp(60px, 15vw, 60px);
}

/* ================== GOOGLE TRANSLATE - COMPLETE HIDE ================== */
#google_translate_element,
.goog-te-banner-frame,
.goog-te-menu-frame,
.goog-te-balloon-frame,
.goog-te-gadget,
.goog-logo-link,
.goog-te-gadget span,
.skiptranslate,
.goog-te-combo,
.VIpgJd-ZVi9od-ORHb-OEVmkb svg,
[aria-label*="Google"],
[title*="Google"] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  z-index: -9999 !important;
}
.pass-wrapper button {
  position: absolute;
  left: clamp(12px, 3vw, 12px);
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: clamp(16px, 4vw, 18px);
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  transition: all 0.3s ease;
  min-width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.pass-wrapper button:hover {
  color: var(--accent);
  background: rgba(255, 180, 0, 0.1);
}

/* Submit Button - Responsive */
#login-form button[type="submit"] {
  padding: clamp(20px, 5vw, 24px) clamp(32px, 8vw, 36px);
  border: none;
  border-radius: 50px;
  font-size: clamp(1rem, 4vw, 1.2rem);
  font-weight: 800;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
  background: var(--gradient);
  color: #000;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: var(--shadow);
  margin-top: clamp(8px, 2vw, 12px);
  min-height: 56px;
}

#login-form button[type="submit"]::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: left 0.7s;
}

#login-form button[type="submit"]:hover::before {
  left: 100%;
}

#login-form button[type="submit"]:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 40px 60px -15px rgba(255, 180, 0, 0.45);
}

#login-form button[type="submit"]:active {
  transform: translateY(-4px) scale(1.02);
}

/* Social Login - Responsive */
.social-login {
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 3vw, 12px);
  margin-top: clamp(20px, 5vw, 20px);
}

.social-login button {
  padding: clamp(14px, 4vw, 16px) clamp(20px, 6vw, 24px);
  border: 2px solid var(--border);
  border-radius: 16px;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: clamp(0.9rem, 3.5vw, 1rem);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  position: relative;
  overflow: hidden;
  min-height: 52px;
}

.social-login button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.6s;
}

.social-login button:hover::before {
  left: 100%;
}

.social-login button:hover {
  border-color: var(--accent);
  background: rgba(255, 180, 0, 0.08);
  transform: translateY(-2px);
  box-shadow: 0 15px 30px rgba(255, 180, 0, 0.2);
}

/* Links Section - Responsive */
.links-section {
  margin-top: clamp(24px, 6vw, 32px);
  padding-top: clamp(20px, 5vw, 28px);
  border-top: 1px solid var(--border);
  text-align: center;
}

.links-section .link {
  color: var(--text-muted);
  text-decoration: none;
  font-weight: 600;
  font-size: clamp(0.85rem, 3vw, 0.95rem);
  transition: all 0.3s ease;
  display: inline-block;
  margin: clamp(4px, 1vw, 8px);
  position: relative;
  line-height: 1.5;
}

.links-section .link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: all 0.3s ease;
  transform: translateX(-50%);
}

.links-section .link:hover {
  color: var(--accent);
}

.links-section .link:hover::after {
  width: 100%;
}

/* Messages */
#msg {
  margin-top: clamp(20px, 5vw, 30px);
  min-height: 24px;
}

.success, .error {
  padding: clamp(16px, 4vw, 20px) clamp(24px, 6vw, 28px);
  border-radius: 16px;
  font-weight: 600;
  font-size: clamp(0.9rem, 3.5vw, 1rem);
  animation: msgSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(15px);
  border: 1px solid transparent;
  text-align: center;
  box-shadow: var(--shadow);
  line-height: 1.5;
}

@keyframes msgSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Loading State */
#login-form button[type="submit"].loading {
  pointer-events: none;
  position: relative;
  color: #000;
}

#login-form button[type="submit"].loading::after {
  content: '';
  position: absolute;
  width: clamp(24px, 6vw, 28px);
  height: clamp(24px, 6vw, 28px);
  margin: auto;
  border: 3px solid transparent;
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Animations */
#login-form button[type="submit"] {
  animation: buttonPulse 3s ease-in-out infinite alternate;
}

@keyframes buttonPulse {
  from { box-shadow: var(--shadow); }
  to { box-shadow: 0 0 50px rgba(255, 180, 0, 0.6); }
}

/* 🔥 Media Queries محسّنة لكل الأجهزة 🔥 */

/* iPhone SE (320px) & Small Screens */
@media (max-width: 375px) {
  html { font-size: 15px; }
  body { padding: 10px; }
  .card { 
    padding: 30px 25px; 
    margin: 10px 0;
    border-radius: 16px;
  }
  .logo-img { 
    width: 65px; 
    height: 65px; 
  }
  .logo h3 { 
    font-size: 1.6rem; 
  }
  .logo h3:nth-of-type(2) { 
    font-size: 1.3rem; 
  }
  #login-form input { 
    padding: 18px 20px; 
    font-size: 0.95rem;
    min-height: 52px;
  }
  .pass-wrapper input { padding-right: 55px; }
  .pass-wrapper button { 
    left: 10px; 
    font-size: 16px;
    min-width: 40px;
    height: 40px;
  }
}

/* iPhone 12/13/14 (390px) */
@media (max-width: 414px) {
  .card { padding: 35px 28px; }
  .links-section .link { 
    display: block; 
    margin: 6px 0; 
  }
}

/* Tablets Portrait */
@media (max-width: 768px) and (orientation: portrait) {
  .card { 
    max-width: 95vw; 
    padding: 40px 30px; 
  }
  body { 
    padding: 15px; 
    align-items: flex-start;
    padding-top: 20px;
  }
}

/* Tablets Landscape */
@media (max-width: 1024px) and (orientation: landscape) {
  .card { 
    max-width: 450px; 
    padding: 40px 35px; 
  }
  body { padding: 20px; }
}

/* Large Tablets & Small Laptops */
@media (min-width: 768px) and (max-width: 1024px) {
  .card { max-width: 500px; }
}

/* Desktop */
@media (min-width: 1025px) {
  .card { max-width: 500px; }
  body { padding: 40px; }
}

/* Extra Large Screens */
@media (min-width: 1440px) {
  .card { max-width: 520px; }
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg);
}

::-webkit-scrollbar-thumb {
  background: var(--surface-2);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}

/* RTL & LTR Support */
[dir="rtl"] input { text-align: right; }
[dir="ltr"] input { text-align: left; }
[dir="rtl"] .pass-wrapper button { left: auto; right: 12px; }
[dir="ltr"] .pass-wrapper button { left: 12px; right: auto; }
[dir="rtl"] .pass-wrapper input { padding-right: 28px; padding-left: 60px; }
[dir="ltr"] .pass-wrapper input { padding-right: 60px; padding-left: 28px; }

/* Floating Particles */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(2px 2px at 20px 30px, rgba(255, 180, 0, 0.3), transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255, 122, 0, 0.25), transparent),
    radial-gradient(1px 1px at 90px 40px, rgba(255, 180, 0, 0.4), transparent),
    radial-gradient(1px 1px at 130px 80px, rgba(255, 122, 0, 0.3), transparent);
  pointer-events: none;
  animation: particlesFloat 20s linear infinite;
  opacity: 0.3;
}

@keyframes particlesFloat {
  from { transform: translateY(0px) rotate(0deg); }
  to { transform: translateY(-100px) rotate(360deg); }
}

/* Prevent Zoom on iOS */
input, button {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

/* High DPI Displays */
@media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
  .card {
    border-width: 0.5px;
  }
  .logo-img {
    border-width: 2px;
  }
}
      /* باقي الـ CSS كما هو... */
      /* (انسخ كل الـ CSS من الرد السابق هنا) */
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <h3>SUNGET.COM</h3>
        <h3>تسجيل دخول</h3>
      </div>

      <form id="login-form">
        <input 
          id="email" 
          type="email" 
          placeholder="البريد الإلكتروني" 
          required 
          autocomplete="email" 
        />
        <div class="pass-wrapper">
          <input 
            id="password" 
            type="password" 
            placeholder="كلمة المرور" 
            required 
            autocomplete="current-password" 
          />
          <button type="button" id="togglePass" aria-label="إظهار كلمة المرور">👁</button>
        </div>
        <button type="submit" id="loginBtn">تسجيل الدخول</button>
      </form>

      <div id="msg"></div>

      <div class="social-login">
        <button id="googleLogin">تسجيل دخول بجوجل</button>
        <button id="facebookLogin">تسجيل دخول بفيسبوك</button>
      </div>

      <div class="links-section">
        <a href="signup.html" class="link">ليس لديك حساب؟ إنشاء حساب جديد</a>
        <a href="forgot_password.html" class="link">نسيت كلمة المرور؟</a>
      </div>
    </div>

    <!-- 🔥 فقط Supabase (بدون i18next) 🔥 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // 🚀 كود مبسط بدون ترجمة
      document.addEventListener('DOMContentLoaded', async function() {
        
        // 1️⃣ Supabase
        const SUPABASE_URL = "https://mqvmxqzwvpasdytbpbke.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2️⃣ رسائل ثابتة (عربي فقط)
        const messages = {
          loading: "جارٍ تسجيل الدخول...",
          user_success: "✅ تم تسجيل الدخول كمستخدم بنجاح",
          provider_success: "✅ تم تسجيل الدخول كمزود خدمة بنجاح",
          wrong: "❌ البريد الإلكتروني أو كلمة المرور غير صحيحة",
          no_account: "❌ لا يوجد حساب مرتبط بهذا البريد الإلكتروني",
          error: "❌ حدث خطأ أثناء تسجيل الدخول",
          required: "❌ يرجى إدخال البريد الإلكتروني وكلمة المرور",
          unknown_role: "❌ نوع الحساب غير محدد"
        };

        // 3️⃣ دالة الرسائل
        function showMsg(el, text, type = "error") {
          if (!el) return;
          el.innerHTML = `<div class="${type}">${text}</div>`;
        }

        // 4️⃣ تسجيل الدخول
        const loginForm = document.getElementById("login-form");
        const loginBtn = document.getElementById("loginBtn");
        const msgEl = document.getElementById("msg");

        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!email || !password) {
            showMsg(msgEl, messages.required);
            return;
          }

          loginBtn.classList.add("loading");
          loginBtn.innerHTML = `<span>${messages.loading}</span>`;

          try {
            const { data, error } = await sb.auth.signInWithPassword({ 
              email, 
              password 
            });

            if (error) {
              showMsg(msgEl, messages.wrong);
              return;
            }

            if (!data.user) {
              showMsg(msgEl, messages.no_account);
              return;
            }

            console.log("✅ User logged in:", data.user);
            console.log("Metadata:", data.user.user_metadata);

            const role = data.user.user_metadata?.role;

            if (role === "user") {
              showMsg(msgEl, messages.user_success, "success");
              setTimeout(() => window.location.href = "index.html", 1500);
              return;
            }

            if (role === "provider") {
              showMsg(msgEl, messages.provider_success, "success");
              setTimeout(() => window.location.href = "تسجيل الفندق.html", 1500);
              return;
            }

            showMsg(msgEl, messages.unknown_role);

          } catch (err) {
            console.error("❌ Login Error:", err);
            showMsg(msgEl, messages.error);
          } finally {
            loginBtn.classList.remove("loading");
            loginBtn.textContent = "تسجيل الدخول";
          }
        });

        // 5️⃣ Google Login
        document.getElementById("googleLogin").addEventListener("click", async () => {
          await sb.auth.signInWithOAuth({
            provider: "google",
            options: { redirectTo: window.location.origin + "/index.html" }
          });
        });

        // 6️⃣ Facebook Login
        document.getElementById("facebookLogin").addEventListener("click", async () => {
          await sb.auth.signInWithOAuth({
            provider: "facebook",
            options: { redirectTo: window.location.origin + "/index.html" }
          });
        });

        // 7️⃣ Password Toggle
        document.getElementById("togglePass").addEventListener("click", () => {
          const passwordInput = document.getElementById("password");
          const isHidden = passwordInput.type === "password";
          passwordInput.type = isHidden ? "text" : "password";
          event.target.textContent = isHidden ? "🙈" : "👁";
        });

        console.log("✅ Login page loaded perfectly!");
      });
    </script>
  <script src="translate.js"></script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
