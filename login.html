  <style>
/* sunget-login.css - نفس الستايل الداكن الاحترافي 🔥 */
:root {
  --bg: #0b0b0f;
  --bg-2: #14141c;
  --surface: #1a1a24;
  --surface-2: #20202c;
  --text: #ffffff;
  --text-muted: #b8b8c4;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #ffb400;
  --accent-2: #ff7a00;
  --danger: #e63946;
  --success: #27b82e;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 35px 60px -15px rgba(0, 0, 0, 0.5);
  --radius: 20px;
  --gradient: linear-gradient(135deg, var(--accent), var(--accent-2));
  --gradient-hover: linear-gradient(135deg, var(--accent-2), var(--accent));
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 10% 30%, rgba(255, 180, 0, 0.12) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255, 122, 0, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 40% 10%, rgba(255, 180, 0, 0.06) 0%, transparent 40%);
  z-index: -1;
  animation: backgroundFloat 30s ease-in-out infinite;
}

@keyframes backgroundFloat {
  0%, 100% { transform: scale(1) translateY(0px); }
  33% { transform: scale(1.05) translateY(-20px); }
  66% { transform: scale(1.02) translateY(-10px); }
}
/* ============ Social Login Buttons ============ */
.social-login {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 24px;
}

.social-divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 28px 0 8px;
  color: var(--text-muted);
  font-size: 0.9rem;
  font-weight: 600;
}

.social-divider::before,
.social-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.social-btn {
  width: 100%;
  padding: 18px 24px;
  border: 2px solid var(--border);
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow);
}

.social-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.6s;
}

.social-btn:hover::before { left: 100%; }

.social-btn .icon {
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: #fff;
  flex-shrink: 0;
}

.social-btn .icon svg {
  width: 18px;
  height: 18px;
}

/* Google */
.btn-google {
  background: #fff;
  color: #3c4043;
  border-color: #fff;
}
.btn-google:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 20px 40px rgba(255, 255, 255, 0.2);
  background: #f8f9fa;
}

/* Facebook */
.btn-facebook {
  background: linear-gradient(135deg, #1877f2, #0a5fd1);
  color: #fff;
  border-color: transparent;
}
.btn-facebook .icon { background: transparent; }
.btn-facebook .icon svg { width: 26px; height: 26px; }
.btn-facebook:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 20px 40px rgba(24, 119, 242, 0.45);
  background: linear-gradient(135deg, #0a5fd1, #1877f2);
}

.social-btn:active { transform: translateY(-1px) scale(1.01); }

@media (max-width: 600px) {
  .social-btn { padding: 16px 20px; font-size: 0.95rem; }
}

/* Main Card */
.card {
  background: rgba(26, 26, 36, 0.95);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 60px 50px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  animation: cardSlideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes cardSlideIn {
  from {
    opacity: 0;
    transform: translateY(50px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--gradient);
  border-radius: var(--radius) var(--radius) 0 0;
}

/* Logo Section */
.logo {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
}

.logo-img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid rgba(255, 255, 255, 0.15);
  margin: 0 auto 24px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.logo-img:hover {
  transform: scale(1.08) rotate(5deg);
  border-color: rgba(255, 180, 0, 0.4);
  box-shadow: 0 20px 45px rgba(255, 180, 0, 0.3);
}

.logo h3 {
  font-size: clamp(2rem, 5vw, 2.8rem);
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.8px;
  margin-bottom: 8px;
}

.logo h3:nth-of-type(2) {
  font-size: clamp(1.6rem, 3vw, 2.2rem);
  font-weight: 700;
  color: var(--text);
  background: none;
  -webkit-text-fill-color: var(--text);
  margin-top: 4px;
  opacity: 0.9;
}

/* Form */
#login-form {
  display: flex;
  flex-direction: column;
  gap: 28px;
}

#login-form input {
  width: 100%;
  padding: 24px 28px;
  border: 2px solid var(--border);
  border-radius: 16px;
  font-size: 1.1rem;
  font-family: inherit;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  color: var(--text);
  font-weight: 500;
}

#login-form input::placeholder {
  color: var(--text-muted);
  font-weight: 400;
}

#login-form input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 
    0 0 0 4px rgba(255, 180, 0, 0.15),
    0 20px 40px rgba(0, 0, 0, 0.3);
  transform: translateY(-3px);
  background: var(--surface-2);
}

/* Submit Button */
#login-form button {
  padding: 24px 36px;
  border: none;
  border-radius: 50px;
  font-size: 1.2rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-family: inherit;
  position: relative;
  overflow: hidden;
  background: var(--gradient);
  color: #000;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: var(--shadow);
  margin-top: 12px;
}

#login-form button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: left 0.7s;
}

#login-form button:hover::before {
  left: 100%;
}

#login-form button:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 40px 60px -15px rgba(255, 180, 0, 0.45);
}

#login-form button:active {
  transform: translateY(-4px) scale(1.02);
}

/* Messages */
#msg {
  margin-top: 30px;
  min-height: 24px;
}

.success, .error {
  padding: 20px 28px;
  border-radius: 16px;
  font-weight: 600;
  font-size: 1rem;
  animation: msgSlideIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(15px);
  border: 1px solid transparent;
  text-align: center;
  box-shadow: var(--shadow);
}

.success {
  background: rgba(39, 184, 46, 0.18);
  color: var(--success);
  border-color: rgba(39, 184, 46, 0.35);
}

.error {
  background: rgba(230, 57, 70, 0.18);
  color: var(--danger);
  border-color: rgba(230, 57, 70, 0.35);
}

@keyframes msgSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Loading State */
#login-form button.loading {
  pointer-events: none;
  position: relative;
  color: #000;
}

#login-form button.loading::after {
  content: '';
  position: absolute;
  width: 28px;
  height: 28px;
  margin: auto;
  border: 3px solid transparent;
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Pulse Glow Animation */
#login-form button {
  animation: buttonPulse 3s ease-in-out infinite alternate;
}

@keyframes buttonPulse {
  from {
    box-shadow: var(--shadow);
  }
  to {
    box-shadow: 0 0 50px rgba(255, 180, 0, 0.6);
  }
}

/* Responsive Design */
@media (max-width: 600px) {
  .card {
    padding: 50px 35px;
    margin: 10px;
    max-width: none;
  }
  
  .logo-img {
    width: 80px;
    height: 80px;
  }
  
  .logo h3 {
    font-size: 1.8rem;
  }
  
  .logo h3:nth-of-type(2) {
    font-size: 1.5rem;
  }
  
  #login-form input {
    padding: 22px 24px;
    font-size: 1rem;
  }
  
  #login-form button {
    padding: 22px 32px;
    font-size: 1.1rem;
  }
}

@media (max-width: 400px) {
  .card {
    padding: 40px 28px;
  }
  
  body {
    padding: 10px;
  }
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg);
}

::-webkit-scrollbar-thumb {
  background: var(--surface-2);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}

/* RTL Support Enhancement */
[dir="rtl"] .card {
  text-align: center;
}

[dir="rtl"] input {
  text-align: right;
}

/* Floating Particles Effect */
.card::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background-image: 
    radial-gradient(2px 2px at 20px 30px, rgba(255, 180, 0, 0.3), transparent),
    radial-gradient(2px 2px at 40px 70px, rgba(255, 122, 0, 0.25), transparent),
    radial-gradient(1px 1px at 90px 40px, rgba(255, 180, 0, 0.4), transparent),
    radial-gradient(1px 1px at 130px 80px, rgba(255, 122, 0, 0.3), transparent);
  pointer-events: none;
  animation: particlesFloat 20s linear infinite;
  opacity: 0.3;
}

@keyframes particlesFloat {
  from { transform: translateY(0px) rotate(0deg); }
  to { transform: translateY(-100px) rotate(360deg); }
}
.pass-wrapper {

  width: 100%;
}

.pass-wrapper input {
  padding-right: 60px;
}

.pass-wrapper button {
  position: absolute;
  left: 12px;

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 1️⃣ إنشاء عميل Supabase
  const SUPABASE_URL = "https://mqvmxqzwvpasdytbpbke.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xdm14cXp3dnBhc2R5dGJwYmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIyODMwMjksImV4cCI6MjA3Nzg1OTAyOX0.jHrxC0IcuWYkSaB2y-guc5tl5dPPWFSoasv3rmjcxuM";

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 2️⃣ دالة لإظهار الرسائل
  function show(el, text, type = "error") {
    if (!el) return;
    el.innerHTML = `<div class="${type}">${text}</div>`;
  }

  // 3️⃣ التعامل مع نموذج تسجيل الدخول
  const loginForm = document.getElementById("login-form");
  if (loginForm) {
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const msgEl = document.getElementById("msg");

      if (!emailEl || !passwordEl || !msgEl) return;

      const email = emailEl.value.trim();
      const password = passwordEl.value;

      show(msgEl, "جارٍ تسجيل الدخول...", "success");

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          show(msgEl, "❌ البريد الإلكتروني أو كلمة المرور غير صحيحة");
          return;
        }

        if (!data.user) {
          show(msgEl, "❌ حدث خطأ: المستخدم غير موجود");
          return;
        }

        console.log("User:", data.user);
        console.log("Metadata:", data.user.user_metadata);

        const role = data.user.user_metadata?.role;

        if (role === "user") {
          show(msgEl, "✅ تم تسجيل الدخول كمستخدم", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);
          return;
        }

        if (role === "provider") {
          show(msgEl, "✅ تم تسجيل الدخول كمزود خدمة", "success");
          setTimeout(() => {
            window.location.href = "تسجيل الفندق.html";
          }, 1000);
          return;
        }

        show(msgEl, "❌ نوع الحساب غير محدد");

      } catch (err) {
        console.error("Login Error:", err);
        show(msgEl, "❌ حدث خطأ غير متوقع");
      }
    });
  }
</script>

// تهيئة i18next
i18next.init({
  lng: localStorage.getItem("lang") || "ar",
  fallbackLng: "en",
  debug: false,
  resources
}, function() {
  updateContent();
});

function updateContent() {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.innerHTML = i18next.t(el.dataset.i18n);
  });
  document.querySelectorAll("input[data-i18n-placeholder]").forEach(el => {
    el.placeholder = i18next.t(el.dataset.i18nPlaceholder);
  });
  document.documentElement.lang = i18next.language;
  document.documentElement.dir = i18next.language === "ar" ? "rtl" : "ltr";
}

function changeLanguage(lang) {
  i18next.changeLanguage(lang, () => {
    localStorage.setItem("lang", lang);
    updateContent();
  });
}
</script>
<script>
  const toggleBtn = document.getElementById("togglePass");
const passwordInput = document.getElementById("password");

toggleBtn.addEventListener("click", () => {
  const isHidden = passwordInput.type === "password";

  passwordInput.type = isHidden ? "text" : "password";
  toggleBtn.textContent = isHidden ? "🙈" : "👁";
});
</script>
<script>
async function checkOAuthUser() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data.user) return;

  console.log("OAuth User:", data.user);

  // لو أول مرة يسجل
  const role = data.user.user_metadata?.role || "user";

  // تخزين role لو مش موجود
  if (!data.user.user_metadata?.role) {
    await supabaseClient.auth.updateUser({
      data: {
        role: "user"
      }
    });
  }

  // تحويل المستخدم
  if (role === "provider") {
    window.location.href = "تسجيل الفندق.html";
  } else {
    window.location.href = "index.html";
  }
}

// تشغيل الفحص بعد الرجوع من Google/Facebook
checkOAuthUser();
</script>
<script>

  // Google
document.getElementById("googleLogin").onclick = async () => {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/login.html"
    }
  });

  if (error) {
    console.error(error);
  }
};

// Facebook
document.getElementById("facebookLogin").onclick = async () => {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: "facebook",
    options: {
      redirectTo: window.location.origin + "/login.html"
    }
  });

  if (error) {
    console.error(error);
  }
};
</script>
